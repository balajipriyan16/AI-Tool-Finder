<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FindMyAI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>  
    <section id="home" class="header">
        <div class="header-left">
            <h1>FindMy<span class="AI-CLASS">AI</span></h1>
        </div>

        <div id="MenuBtn" class="menu block md:hidden cursor-pointer">
            <i class="fa-solid fa-bars"></i>
        </div>

        <div class="hidden md:flex gap-5 justify-center items-center">
            <a class="hover:underline hover:text-red-500" href="#search">Home</a>
            <a class="hover:underline hover:text-red-500" href="#search">Tools</a>
            <a class="hover:underline hover:text-red-500" href="#footer">About</a>
            <a class="hover:underline hover:text-red-500" href="contact.html">Contact</a>
            <a href="./Login/login.html">
                <div class="bg-[#ff435e] w-10 h-10 flex justify-center items-center rounded-full cursor-pointer">
                    <i class="fa-solid fa-user text-white"></i>
                </div>
            </a>
        </div>
    </section>

    <!-- SideNavbar -->
    <div class="SideNavbar">
        <div class="sideNavItemsdiv">
            <div class="sideNavItems">
                <a class="hover:underline hover:text-red-500" href="#search">Home</a>
                <a class="hover:underline hover:text-red-500" href="#search">Tools</a>
                <a class="hover:underline hover:text-red-500" href="#footer">About</a>
                <a class="hover:underline hover:text-red-500" href="contact.html">Contact</a>
                <a href="./Login/login.html">
                    <div class="bg-[#ff435e] w-10 h-10 flex justify-center items-center rounded-full cursor-pointer">
                        <i class="fa-solid fa-user text-white"></i>
                    </div>
                </a>
            </div>
            
            <div class="cursor-pointer close" id="closebtn">
                X
            </div>
        </div>
    </div>

    <div class="container">
        <!-- Search Line -->
        <section id="search" class="Title">
            <div class="Title-Heading">
                <h1>Find the right AI tool</h1>
            </div>

            <div class="INPUT">
                <input type="text" placeholder="Search for anything.. eg: Coding, chatbot, Image Generation">
            </div>

            <div class="Browse">
                <div class="Browse-Title">
                    <h1>Browse By Categories</h1>
                    <div class="categories">
                        <div>
                            <button>All</button>
                        </div>
                    </div>
                </div>
                <hr>
                <div class="Ai-Card-container">
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer id="footer" class="footer">
        <div class="footer-container">

            <div class="footer-brand">
                <h2>FindMyAI</h2>
                <p>Discover the perfect AI tool for every task.</p>
            </div>

            <div class="footer-links">
                <h3>Quick Links</h3>
                <a href="#home">Home</a>
                <a href="#search">Tools</a>
            </div>

            <div class="footer-contact">
                <h3>Contact</h3>
                <p>Email: support@findmyai.com</p>
            </div>

        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 FindMyAI. All Rights Reserved.</p>
        </div>
        </footer>
    
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
